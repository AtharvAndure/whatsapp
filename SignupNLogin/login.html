<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Login - Batte</title>
    <link rel="stylesheet" href="./style/login.css">
  </head>
  <body>
    <div class="toast" id="toast">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" class="icon" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text" id="text"></p>
    </div>

    <div class="login-wrapper">
      <div class="login-box">
        
        <div class="deco-line top-deco"></div>
        <div class="deco-line bot-deco"></div>

        <div class="logo-container">
          <svg>
            <defs>
              <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                <feMerge>
                  <feMergeNode in="coloredBlur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <text x="50%" y="50%" dy=".35em" text-anchor="middle">
              BAATE
            </text>
          </svg>
        </div>

        <form action="" method="post" id="loginform">
          <div class="input-group">
            <input type="text" id="username" name="username" required autocomplete="off">
            <label for="user">Username</label>
          </div>
          <br>
          <div class="input-group">
            <input type="password" id="password" name="password" required autocomplete="new-password">
            <label for="pass">Password</label>
          </div>

          <input type="submit" class="btn-login" value="Initialize"/>
        </form>

        <div class="links">
          <a href="reset.html">Forget Useraname/Password</a>
          <a href="sigup.html">Register</a>
        </div>

      </div>
    </div>

      <script src="./loginBackend/login.js"></script>
    </body>
  </html>
