<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Registration - Batte</title>
    <link rel="stylesheet" href="./style/signup.css">
  </head>
  <body class="signup-page">

    <div class="toast" id="toast">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" class="icon" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <p class="text" id="text"></p>
    </div>

    <!-- SUCCESS MODAL -->
    <div class="success-modal" id="successModal">
      <div class="success-modal-content">
        <div class="success-modal-box">
          <div class="success-icon">✓</div>
          <p class="success-text">You Have Successfully Signed Up!</p>
          <p class="success-subtext">Welcome to the BATTE Community. Redirecting to Profile Discription...</p>
          <button class="success-btn" onclick="closeSuccessModal()">Next</button>
        </div>
      </div>
    </div>

    <div class="signup-wrapper">
      <div class="signup-box">
        <div class="deco-line top-deco"></div>
        <div class="deco-line bot-deco"></div>

        <div class="logo-container">
          <svg>
            <defs>
              <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="coloredBlur" />
                <feMerge>
                  <feMergeNode in="coloredBlur" />
                  <feMergeNode in="SourceGraphic" />
                </feMerge>
              </filter>
            </defs>
            <text x="50%" y="50%" dy=".35em" text-anchor="middle">BAATE</text>
          </svg>
        </div>

        <form id="signupForm" style="display: flex; flex-direction: column; gap: 2.5rem">
          <div class="input-group validation">
            <input type="text" id="username" name="username" required autocomplete="off" />
            <label for="username">Username</label>
          </div>

          <div class="name-row">
            <div class="input-group">
              <input type="text" id="firstname" name="firstname" required autocomplete="off" disabled />
              <label for="firstname">First Name</label>
            </div>
            <div class="input-group">
              <input type="text" id="lastname" name="lastname" required autocomplete="off" disabled />
              <label for="lastname">Last Name</label>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <input type="email" id="email" name="email" required autocomplete="off" disabled />
              <label for="email">Email Address</label>
            </div>
            <button type="button" class="btn-otp" id="btn-otp">GET OTP</button>
          </div>

          <div class="input-group otp-container">
            <input type="text" id="otp" name="otp" required autocomplete="off" maxlength="6">
            <label for="otp">Enter Code</label>
          </div>

          <div class="input-group">
            <input type="password" id="pass" name="pass" required disabled />
            <label for="pass">Password</label>
          </div>

          <div class="input-group">
            <input type="password" id="c_pass" name="c_pass" required disabled />
            <label for="confirm_pass">Confirm Password</label>
          </div>

          <div class="gender-container">
            <label class="gender-label-title">Gender</label>
            <div class="gender-group">
              <label>
                <input type="radio" name="gender" value="male" checked />
                Male
              </label>
              <label>
                <input type="radio" name="gender" value="female" />
                Female
              </label>
            </div>
          </div>

          <input type="submit" value="REGISTER" class="btn-signup" />
        </form>

        <div class="links">
          <a href="login.html">// ALREADY HAVE AN ACCOUNT? LOGIN</a>
        </div>
      </div>
    </div>

    <script src="SignupNLoginBackend/signup.js"></script>
  </body>
</html>
