<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <h1>Validation</h1>
    <input type="text" name="email" id="email">
    <input type="button" value="submit" id="submit" disabled/>
    <br><br>
    <input type="text" name="otp" id="otp" disabled/>
    <input type="button" value="verify" id="verify" disabled/>
    <script>
        const button = document.getElementById("submit");
        const email = document.getElementById("email"); 
        const otpInput = document.getElementById("otp");
        const verifyButton = document.getElementById("verify");  
        
        // Email validation to enable/disable button
        email.addEventListener("input", function(){
            var emailValue = email.value;
            // Slightly improved regex
            var regex = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
            
            if(regex.test(emailValue)){
                button.disabled = false;
            } else {
                button.disabled = true;
            }
        });

        // Changed from 'keydown' to 'click'
        button.addEventListener("click", async function() {
            const data = new FormData();
            email.disabled = true;
            button.disabled = true; // Good practice to disable the button while fetching
            
            data.append("email", email.value);
            
            try {
                const response = await fetch("e.php", {
                    method: "POST",
                    // REMOVED the Content-Type header so the browser handles FormData correctly
                    body: data
                });

                const responseData = await response.json();

                // Changed to check data.status based on your PHP
                if(responseData.status === "success"){
                    console.log("Email submitted successfully! Message:", responseData.message);
                    otpInput.disabled = false;
                } else {
                    console.log("Failed to submit email. Message:", responseData.message);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("An error occurred while submitting the email.");
            } finally {
                // Re-enable inputs after the request finishes
                email.disabled = false;
                button.disabled = false;
            }
        });

        otpInput.addEventListener("input", function() {
            if(otpInput.value.length === 6){
                verifyButton.disabled = false;
            } else {
                verifyButton.disabled = true;
            }
        });
        verifyButton.addEventListener("click", async function() {
            const data=new FormData();
            data.append("verify_otp",otpInput.value);
            otpInput.disabled = true;
            const response=await fetch("verify.php",{
                method:"POST",
                body:data
            })
            if(response.ok){
                const responseData=await response.json();
                if(responseData.status === "success"){
                    window.location.href = "success.html"; // Redirect to success pages
                    console.log("OTP verified successfully! Message:", responseData.message);

                } else {
                    console.log("Failed to verify OTP. Message:", responseData.message);
                    otpInput.disabled = false; // Re-enable OTP input for retry
                }
            } else {
                console.error("Error verifying OTP. Status:", response.status);
                alert("An error occurred while verifying the OTP.");
            }
        });
    </script>
</body>
</html>
