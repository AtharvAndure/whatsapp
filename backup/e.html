<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        table {
            width: 300px;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #f2f2f2;
        }

        img {
            width: 40px;
            height: 40px;
            object-fit: cover;
        }
    </style>
</head>

<body>

    <div>
        <input type="file" id="img" accept="image/*">
    </div>

    <div>
        <table>
            
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                </tr>
            </thead>

            <tbody>
                <tr id="row">
                    
                </tr>
            </tbody>

        </table>
    </div>
    <script src="e.js"></script>
</body>
</html>
