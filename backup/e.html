<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation</title>
</head>
<body>
    <h1>Validation</h1>
    <input type="text" name="email" id="email">
    <input type="button" value="submit" id="submit" disabled/>
    <script>
        const button=document.getElementById("submit");
        const email=document.getElementById("email");   
        email.addEventListener("input", function(){
            var email = document.getElementById("email").value;
            var regex = /^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/;
            if(regex.test(email)){
                document.querySelector("input[type='button']").disabled = false;
            }else{
                document.querySelector("input[type='button']").disabled = true;
            }
        });
        button.addEventListener("keydown",async function(){
            const data=new FormData();
            email.disabled=true;
            data.append("email",email.value);
            const response=await fetch("e.php",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:data
            });
        });

    </script>
</body>
</html>
